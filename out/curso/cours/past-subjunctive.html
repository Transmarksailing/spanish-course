schil tussen indefinido en imperfecto — de subjunctivo verwijst naar een actie in het verbeelde of hypothetische verleden.\\n\\nIk **hoopte** dat Ricardo het boek **had**. → Yo esperaba que Ricardo tuviera el libro.\\n\\n📖 **501 Spanish Verbs** #7 · **Practice Makes Perfect** p.233\"}},{\"type\":\"conjugation_table\",\"title\":{\"en\":\"HABLAR — Past Subjunctive\",\"nl\":\"HABLAR — Verleden Subjunctivo\"},\"verb\":\"hablar\",\"tense\":\"past subjunctive\",\"forms\":{\"yo\":\"hablara\",\"tú\":\"hablaras\",\"él/ella/usted\":\"hablara\",\"nosotros\":\"habláramos\",\"vosotros\":\"hablarais\",\"ellos/ustedes\":\"hablaran\"}},{\"type\":\"conjugation_table\",\"title\":{\"en\":\"COMER — Past Subjunctive\",\"nl\":\"COMER — Verleden Subjunctivo\"},\"verb\":\"comer\",\"tense\":\"past subjunctive\",\"forms\":{\"yo\":\"comiera\",\"tú\":\"comieras\",\"él/ella/usted\":\"comiera\",\"nosotros\":\"comiéramos\",\"vosotros\":\"comierais\",\"ellos/ustedes\":\"comieran\"}},{\"type\":\"conjugation_table\",\"title\":{\"en\":\"VIVIR — Past Subjunctive\",\"nl\":\"VIVIR — Verleden Subjunctivo\"},\"verb\":\"vivir\",\"tense\":\"past subjunctive\",\"forms\":{\"yo\":\"viviera\",\"tú\":\"vivieras\",\"él/ella/usted\":\"viviera\",\"nosotros\":\"viviéramos\",\"vosotros\":\"vivierais\",\"ellos/ustedes\":\"vivieran\"}},{\"type\":\"rule_box\",\"title\":{\"en\":\"SI-clauses (If-clauses)\",\"nl\":\"SI-zinnen (Als-zinnen)\"},\"content\":{\"en\":\"The past subjunctive is often used in **si-clauses** (hypothetical situations):\\n\\nIríamos a México **si tuviéramos** el dinero.\\nLuisa iría de compras **si dejara** de nevar.\\nCarlota se casaría con Lucas **si él fuera** rico.\",\"nl\":\"De verleden subjunctivo wordt vaak gebruikt in **si-zinnen** (hypothetische situaties):\\n\\nIríamos a México **si tuviéramos** el dinero. (We zouden naar Mexico gaan als we het geld hadden.)\\nLuisa iría de compras **si dejara** de nevar. (Luisa zou gaan winkelen als het stopte met sneeuwen.)\"}}],\"exercises\":[{\"id\":\"pasts-fill-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Complete with the Past Subjunctive of the verb\",\"nl\":\"Vul aan met de Verleden Subjunctivo van het werkwoord\"},\"items\":[{\"id\":\"pasts-001\",\"sentence\":\"Yo quería que Lola ___ a la fiesta. (venir)\",\"correctAnswers\":[\"viniera\"],\"hint\":\"venir → vinieron → vinier-\"},{\"id\":\"pasts-002\",\"sentence\":\"Preferíamos que tú ___ la guitarra. (tocar)\",\"correctAnswers\":[\"tocaras\"],\"hint\":\"tocar → tocaron → tocar-\"},{\"id\":\"pasts-003\",\"sentence\":\"Insistieron en que yo ___ la cuenta. (pagar)\",\"correctAnswers\":[\"pagara\"],\"hint\":\"pagar → pagaron → pagar-\"},{\"id\":\"pasts-004\",\"sentence\":\"Era importante que los profesores ___ castellano. (enseñar)\",\"correctAnswers\":[\"enseñaran\"],\"hint\":\"enseñar → enseñaron → enseñar-\"},{\"id\":\"pasts-005\",\"sentence\":\"Era necesario que los jefes ___ a los empleados. (hablar)\",\"correctAnswers\":[\"hablaran\"],\"hint\":\"hablar → hablaron → hablar-\"},{\"id\":\"pasts-006\",\"sentence\":\"Yo recomendaba que tú ___ el libro. (leer)\",\"correctAnswers\":[\"leyeras\"],\"hint\":\"leer → leyeron → leyer-\"},{\"id\":\"pasts-007\",\"sentence\":\"No creía que Álvaro ___ aquí. (trabajar)\",\"correctAnswers\":[\"trabajara\"],\"hint\":\"trabajar → trabajaron → trabajar-\"},{\"id\":\"pasts-008\",\"sentence\":\"Él quería que yo ___ una carta. (escribir)\",\"correctAnswers\":[\"escribiera\"],\"hint\":\"escribir → escribieron → escribier-\"},{\"id\":\"pasts-009\",\"sentence\":\"Queríamos que ellos nos ___. (visitar)\",\"correctAnswers\":[\"visitaran\"],\"hint\":\"visitar → visitaron → visitar-\"},{\"id\":\"pasts-010\",\"sentence\":\"Él no estaba seguro de que ella le ___. (amar)\",\"correctAnswers\":[\"amara\"],\"hint\":\"amar → amaron → amar-\"},{\"id\":\"pasts-011\",\"sentence\":\"El doctor insistía en que yo ___ la medicina. (tomar)\",\"correctAnswers\":[\"tomara\"],\"hint\":\"tomar → tomaron → tomar-\"},{\"id\":\"pasts-012\",\"sente
