en**: -í, -iste, -ió, -imos, -isteis, -ieron\\n\\n📖 **501 Spanish Verbs** #3 · **Practice Makes Perfect** p.109\"}},{\"type\":\"conjugation_table\",\"title\":{\"en\":\"HABLAR — Preterite\",\"nl\":\"HABLAR — Indefinido\"},\"verb\":\"hablar\",\"tense\":\"preterite\",\"forms\":{\"yo\":\"hablé\",\"tú\":\"hablaste\",\"él/ella/usted\":\"habló\",\"nosotros\":\"hablamos\",\"vosotros\":\"hablasteis\",\"ellos/ustedes\":\"hablaron\"}},{\"type\":\"conjugation_table\",\"title\":{\"en\":\"COMER — Preterite\",\"nl\":\"COMER — Indefinido\"},\"verb\":\"comer\",\"tense\":\"preterite\",\"forms\":{\"yo\":\"comí\",\"tú\":\"comiste\",\"él/ella/usted\":\"comió\",\"nosotros\":\"comimos\",\"vosotros\":\"comisteis\",\"ellos/ustedes\":\"comieron\"}},{\"type\":\"rule_box\",\"title\":{\"en\":\"Common Irregular Preterites\",\"nl\":\"Veelvoorkomende Onregelmatige Indefinido's\"},\"content\":{\"en\":\"**hacer**: hice, hiciste, hizo, hicimos, hicisteis, hicieron\\n**ir/ser**: fui, fuiste, fue, fuimos, fuisteis, fueron\\n**tener**: tuve, tuviste, tuvo, tuvimos, tuvisteis, tuvieron\\n**poder**: pude, pudiste, pudo, pudimos, pudisteis, pudieron\\n**poner**: puse, pusiste, puso, pusimos, pusisteis, pusieron\\n**decir**: dije, dijiste, dijo, dijimos, dijisteis, dijeron\\n**venir**: vine, viniste, vino, vinimos, vinisteis, vinieron\\n**dar**: di, diste, dio, dimos, disteis, dieron\",\"nl\":\"**hacer**: hice, hiciste, hizo, hicimos, hicisteis, hicieron\\n**ir/ser**: fui, fuiste, fue, fuimos, fuisteis, fueron\\n**tener**: tuve, tuviste, tuvo, tuvimos, tuvisteis, tuvieron\\n**poder**: pude, pudiste, pudo, pudimos, pudisteis, pudieron\\n**poner**: puse, pusiste, puso, pusimos, pusisteis, pusieron\\n**decir**: dije, dijiste, dijo, dijimos, dijisteis, dijeron\"}}],\"exercises\":[{\"id\":\"pret-reg-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Complete with the Preterite — Regular Verbs\",\"nl\":\"Vul aan met de Indefinido — Regelmatige Werkwoorden\"},\"items\":[{\"id\":\"pr-001\",\"sentence\":\"Ellos ___ con el profesor. (hablar)\",\"correctAnswers\":[\"hablaron\"],\"translation\":{\"en\":\"They spoke with the teacher.\",\"nl\":\"Zij spraken met de leraar.\"},\"hint\":\"-ar: ellos → -aron\"},{\"id\":\"pr-002\",\"sentence\":\"Yo ___ a mis abuelos. (visitar)\",\"correctAnswers\":[\"visité\"],\"translation\":{\"en\":\"I visited my grandparents.\",\"nl\":\"Ik bezocht mijn grootouders.\"},\"hint\":\"-ar: yo → -é\"},{\"id\":\"pr-003\",\"sentence\":\"Anoche nosotros ___ la televisión. (mirar)\",\"correctAnswers\":[\"miramos\"],\"translation\":{\"en\":\"Last night we watched television.\",\"nl\":\"Gisteravond keken wij televisie.\"},\"hint\":\"-ar: nosotros → -amos\"},{\"id\":\"pr-004\",\"sentence\":\"Tú ___ mucho. (estudiar)\",\"correctAnswers\":[\"estudiaste\"],\"translation\":{\"en\":\"You studied a lot.\",\"nl\":\"Jij studeerde veel.\"},\"hint\":\"-ar: tú → -aste\"},{\"id\":\"pr-005\",\"sentence\":\"Ellos ___ la comida. (preparar)\",\"correctAnswers\":[\"prepararon\"],\"translation\":{\"en\":\"They prepared the food.\",\"nl\":\"Zij bereidden het eten.\"},\"hint\":\"-ar: ellos → -aron\"},{\"id\":\"pr-006\",\"sentence\":\"El tren ___ tarde. (llegar)\",\"correctAnswers\":[\"llegó\"],\"translation\":{\"en\":\"The train arrived late.\",\"nl\":\"De trein kwam te laat aan.\"},\"hint\":\"-ar: él → -ó\"},{\"id\":\"pr-007\",\"sentence\":\"Ellos ___ mucho el año pasado. (viajar)\",\"correctAnswers\":[\"viajaron\"],\"translation\":{\"en\":\"They travelled a lot last year.\",\"nl\":\"Zij reisden vorig jaar veel.\"},\"hint\":\"-ar: ellos → -aron\"},{\"id\":\"pr-008\",\"sentence\":\"María ___ con Juan. (hablar)\",\"correctAnswers\":[\"habló\"],\"translation\":{\"en\":\"María spoke with Juan.\",\"nl\":\"María sprak met Juan.\"},\"hint\":\"-ar: ella → -ó\"},{\"id\":\"pr-009\",\"sentence\":\"Nosotros ___ en el mar. (nadar)\",\"correctAnswers\":[\"nadamos\"],\"translation\":{\"en\":\"We swam in the sea.\",\"nl\":\"Wij zwommen in de zee.\"},\"hint\":\"-ar: nosotros → -amos\"},{\"id\
