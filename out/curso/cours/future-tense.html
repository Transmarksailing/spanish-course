, -éis, -án**\\n\\nThis is equivalent to 'will' in English.\",\"nl\":\"De onvoltooid toekomende tijd van regelmatige werkwoorden wordt gevormd door de volgende persoonlijke uitgangen aan het hele werkwoord toe te voegen:\\n**-é, -ás, -á, -emos, -éis, -án**\\n\\nDit is vergelijkbaar met 'zullen' in het Nederlands.\"}},{\"type\":\"conjugation_table\",\"title\":{\"en\":\"HABLAR — Future\",\"nl\":\"HABLAR — Toekomende Tijd\"},\"verb\":\"hablar\",\"tense\":\"future\",\"forms\":{\"yo\":\"hablaré\",\"tú\":\"hablarás\",\"él/ella/usted\":\"hablará\",\"nosotros\":\"hablaremos\",\"vosotros\":\"hablaréis\",\"ellos/ustedes\":\"hablarán\"}},{\"type\":\"conjugation_table\",\"title\":{\"en\":\"COMER — Future\",\"nl\":\"COMER — Toekomende Tijd\"},\"verb\":\"comer\",\"tense\":\"future\",\"forms\":{\"yo\":\"comeré\",\"tú\":\"comerás\",\"él/ella/usted\":\"comerá\",\"nosotros\":\"comeremos\",\"vosotros\":\"comeréis\",\"ellos/ustedes\":\"comerán\"}},{\"type\":\"conjugation_table\",\"title\":{\"en\":\"VIVIR — Future\",\"nl\":\"VIVIR — Toekomende Tijd\"},\"verb\":\"vivir\",\"tense\":\"future\",\"forms\":{\"yo\":\"viviré\",\"tú\":\"vivirás\",\"él/ella/usted\":\"vivirá\",\"nosotros\":\"viviremos\",\"vosotros\":\"viviréis\",\"ellos/ustedes\":\"vivirán\"}}],\"exercises\":[{\"id\":\"fut-ira-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Complete the sentences with the appropriate form of IR A + infinitive\",\"nl\":\"Vul de zinnen aan met de juiste vorm van IR A + infinitief\"},\"items\":[{\"id\":\"fut-001\",\"sentence\":\"Yo ___ mañana. (salir)\",\"correctAnswers\":[\"voy a salir\"],\"hint\":\"yo → voy a\"},{\"id\":\"fut-002\",\"sentence\":\"Carlos ___ en Valdelinares. (esquiar)\",\"correctAnswers\":[\"va a esquiar\"],\"hint\":\"él → va a\"},{\"id\":\"fut-003\",\"sentence\":\"Nosotros ___ los resultados la semana que viene. (saber)\",\"correctAnswers\":[\"vamos a saber\"],\"hint\":\"nosotros → vamos a\"},{\"id\":\"fut-004\",\"sentence\":\"Ellos ___ tiempo en Marruecos. (pasar)\",\"co
