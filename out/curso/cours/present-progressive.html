het studeren (op dit moment).\\n\\n**Vorming**: verwijder de -ar/-er/-ir uitgang en voeg toe:\\n**-AR werkwoorden**: -ando (hablar → hablando)\\n**-ER werkwoorden**: -iendo (comer → comiendo)\\n**-IR werkwoorden**: -iendo (vivir → viviendo)\\n\\n**Onregelmatige gerundios**:\\nleer → leyendo, oír → oyendo, dormir → durmiendo, servir → sirviendo, pedir → pidiendo, decir → diciendo, mentir → mintiendo, construir → construyendo, hervir → hirviendo\\n\\n📖 **Practice Makes Perfect** p.93\"}}],\"exercises\":[{\"id\":\"prog-pres-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Write the gerundio (present participle) of the verb\",\"nl\":\"Schrijf het gerundio (tegenwoordig deelwoord) van het werkwoord\"},\"items\":[{\"id\":\"prog-001\",\"sentence\":\"Luis está ___ zapatos nuevos. (comprar)\",\"correctAnswers\":[\"comprando\"],\"translation\":{\"en\":\"Luis is buying new shoes.\",\"nl\":\"Luis is nieuwe schoenen aan het kopen.\"},\"hint\":\"-ar → -ando\"},{\"id\":\"prog-002\",\"sentence\":\"Los estudiantes están ___ para el examen. (estudiar)\",\"correctAnswers\":[\"estudiando\"],\"translation\":{\"en\":\"The students are studying for the exam.\",\"nl\":\"De studenten zijn aan het studeren voor het examen.\"},\"hint\":\"-ar → -ando\"},{\"id\":\"prog-003\",\"sentence\":\"María y Carmen están ___ con Carlos. (hablar)\",\"correctAnswers\":[\"hablando\"],\"translation\":{\"en\":\"María and Carmen are talking with Carlos.\",\"nl\":\"María en Carmen zijn aan het praten met Carlos.\"},\"hint\":\"-ar → -ando\"},{\"id\":\"prog-004\",\"sentence\":\"El señor Ramírez está ___ una carta. (leer)\",\"correctAnswers\":[\"leyendo\"],\"translation\":{\"en\":\"Mr. Ramírez is reading a letter.\",\"nl\":\"Meneer Ramírez is een brief aan het lezen.\"},\"hint\":\"leer → leyendo (irregular)\"},{\"id\":\"prog-005\",\"sentence\":\"Los niños están ___ a su madre. (mentir)\",\"correctAnswers\":[\"mintiendo\"],\"translation\":{\"en\":\"The children are lying to their mother.\",\"nl\":\"De kinderen zijn aan het liegen tegen hun moeder.\"},\"hint\":\"mentir → mintiendo (e→i)\"},{\"id\":\"prog-006\",\"sentence\":\"La camarera está ___ el desayuno. (servir)\",\"correctAnswers\":[\"sirviendo\"],\"translation\":{\"en\":\"The waitress is serving breakfast.\",\"nl\":\"De serveerster is het ontbijt aan het serveren.\"},\"hint\":\"servir → sirviendo (e→i)\"},{\"id\":\"prog-007\",\"sentence\":\"El bebé está ___ en su habitación. (dormir)\",\"correctAnswers\":[\"durmiendo\"],\"translation\":{\"en\":\"The baby is sleeping in his room.\",\"nl\":\"De baby is aan het slapen in zijn kamer.\"},\"hint\":\"dormir → durmiendo (o→u)\"},{\"id\":\"prog-008\",\"sentence\":\"Los arquitectos están ___ una casa. (construir)\",\"correctAnswers\":[\"construyendo\"],\"translation\":{\"en\":\"The architects are building a house.\",\"nl\":\"De architecten zijn een huis aan het bouwen.\"},\"hint\":\"construir → construyendo\"},{\"id\":\"prog-009\",\"sentence\":\"Vosotras estáis ___ música. (oír)\",\"correctAnswers\":[\"oyendo\"],\"translation\":{\"en\":\"You all are listening to music.\",\"nl\":\"Jullie zijn muziek aan het luisteren.\"},\"hint\":\"oír → oyendo\"},{\"id\":\"prog-010\",\"sentence\":\"Yo estoy ___ los ejercicios. (escribir)\",\"correctAnswers\":[\"escribiendo\"],\"translation\":{\"en\":\"I am writing the exercises.\",\"nl\":\"Ik ben de oefeningen aan het schrijven.\"},\"hint\":\"-ir → -iendo\"},{\"id\":\"prog-011\",\"sentence\":\"El ladrón está ___ la evidencia del robo. (esconder)\",\"correctAnswers\":[\"escondiendo\"],\"translation\":{\"en\":\"The thief is hiding the evidence of the robbery.\",\"nl\":\"De dief is het bewijs van de diefstal aan het verbergen.\"},\"hint\":\"-er → -iendo\"},{\"id\":\"prog-012\",\"sentence\":\"¿Quiénes están ___ en el pasillo? (gritar)\",\"correctAnswers\":[\"gritando\"],\"translation\":{\"en\":\"Who is shouting in the hallway?\",\"nl\":\"Wie zijn er aan het schreeuwen in de gang?\"},\"hint\":\"-ar → -ando\"},{\"id\":\"prog-013\",\"sentence\": ie aan het schrijven.\"},\"hint\":\"estaba + -iendo\"},{\"id\":\"prog-020\",\"sentence\":\"Las telefonistas ___ a los clientes por teléfono. (responder)\",\"correctAnswers\":[\"estaban respondiendo\"],\"translation\":{\"en\":\"The telephone operators were answering the customers by phone.\",\"nl\":\"De telefonistes waren de klanten telefonisch aan het beantwoorden.\"},\"hint\":\"estaban + -iendo\"},{\"id\":\"prog-021\",\"sentence\":\"El cajero ___ los depósitos de los clientes. (recibir)\",\"correctAnswers\":[\"estaba recibiendo\"],\"translation\":{\"en\":\"The cashier was receiving the customers' deposits.\",\"nl\":\"De kassier was de stortingen van de klanten aan het ontvangen.\"},\"hint\":\"estaba + -iendo\"},{\"id\":\"prog-022\",\"sentence\":\"Dos señoras ___ unas preguntas en el pasillo. (hacer)\",\"correctAnswers\":[\"estaban haciendo\"],\"translation\":{\"en\":\"Two ladies were asking some questions in the hallway.\",\"nl\":\"Twee dames waren wat vragen aan het stellen in de gang.\"},\"hint\":\"estaban + haciendo\"},{\"id\":\"prog-023\",\"sentence\":\"Yo ___ euros por libras. (cambiar)\",\"correctAnswers\":[\"estaba cambiando\"],\"translation\":{\"en\":\"I was exchanging euros for pounds.\",\"nl\":\"Ik was euro's aan het wisselen voor ponden.\"},\"hint\":\"estaba + -ando\"},{\"id\":\"prog-024\",\"sentence\":\"El director de finanzas ___ un café. (tomar)\",\"correctAnswers\":[\"estaba tomando\"],\"translation\":{\"en\":\"The finance director was having a coffee.\",\"nl\":\"De financieel directeur was een koffie aan het drinken.\"},\"hint\":\"estaba + -ando\"},{\"id\":\"prog-025\",\"sentence\":\"Marta ___ un libro en la cola. (leer)\",\"correctAnswers\":[\"estaba leyendo\"],\"translation\":{\"en\":\"Marta was reading a book in the queue.\",\"nl\":\"Marta was een boek aan het lezen in de rij.\"},\"hint\":\"estaba + leyendo\"}]},{\"id\":\"prog-choose-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Choose the correct gerundio from the list: competir, her
