null,{\"lesson\":{\"slug\":\"reflexive-verbs\",\"year\":\"cours\",\"title\":{\"en\":\"Reflexive Verbs\",\"nl\":\"Wederkerend Werkwoorden\",\"es\":\"Verbos Reflexivos\"},\"grammarSections\":[{\"type\":\"explanation\",\"title\":{\"en\":\"Reflexive Verbs\",\"nl\":\"Wederkerende Werkwoorden\"},\"content\":{\"en\":\"Reflexive verbs indicate that the subject performs an action **on itself**. They use reflexive pronouns: **me, te, se, nos, os, se**.\\n\\nCommon reflexive verbs: levantarse, ducharse, vestirse, acostarse, lavarse, peinarse, afeitarse, maquillarse, despertarse, dormirse, sentarse\\n\\nThe reflexive pronoun goes **before** the conjugated verb:\\n**Me levanto** a las ocho. (I get up at eight.)\",\"nl\":\"Wederkerende werkwoorden geven aan dat het onderwerp een handeling **op zichzelf** uitvoert. Ze gebruiken wederkerende voornaamwoorden: **me, te, se, nos, os, se**.\\n\\nVeelgebruikte wederkerende werkwoorden: levantarse, ducharse, vestirse, acostarse, lavarse, peinarse, afeitarse, maquillarse, despertarse, dormirse, sentarse\\n\\nHet wederkerend voornaamwoord staat **voor** het vervoegde werkwoord:\\n**Me levanto** a las ocho. (Ik sta om acht uur op.)\"}},{\"type\":\"rule_box\",\"title\":{\"en\":\"Reflexive vs Non-Reflexive\",\"nl\":\"Wederkerend vs Niet-Wederkerend\"},\"content\":{\"en\":\"Some verbs change meaning when used reflexively:\\n\\n**preparar** (to prepare sth.) → **prepararse** (to get ready)\\n**probar** (to try/taste) → **probarse** (to try on clothes)\\n**quitar** (to remove sth.) → **quitarse** (to take off clothes)\\n**llevar** (to carry/wear) → **llevarse** (to get along with)\\n**acostar** (to put sb. to bed) → **acostarse** (to go to bed)\\n**enfermar** (to make sick) → **enfermarse** (to get sick)\",\"nl\":\"Sommige werkwoorden veranderen van betekenis bij wederkerend gebruik:\\n\\n**preparar** (bereiden) → **prepararse** (zich klaarmaken)\\n**probar** (proeven) → **probarse** (passen, kleding)\\n**quitar** (verwijderen) → **quitarse** (uittrekken, kleding)\\n**llevar** (dragen) → **llevarse** (opschieten met)\\n**acostar** (iem. naar bed brengen) → **acostarse** (naar bed gaan)\\n**enfermar** (ziek maken) → **enfermarse** (ziek worden)\"}},{\"type\":\"rule_box\",\"title\":{\"en\":\"Become in Spanish\",\"nl\":\"Worden in het Spaans\"},\"content\":{\"en\":\"**ponerse** + adjective = emotional/physical change (no effort)\\n→ Él se pone pálido. (He turns pale.)\\n\\n**volverse** + adjective = sudden involuntary change\\n→ Carlos se volvió loco. (Carlos went crazy.)\\n\\n**hacerse** + noun/adjective = achieved status (effort required)\\n→ Juan se hizo abogado. (Juan became a lawyer.)\",\"nl\":\"**ponerse** + bijv.nw. = emotionele/fysieke verandering (geen inspanning)\\n→ Él se pone pálido. (Hij wordt bleek.)\\n\\n**volverse** + bijv.nw. = plotselinge onvrijwillige verandering\\n→ Carlos se volvió loco. (Carlos werd gek.)\\n\\n**hacerse** + zn./bijv.nw. = bereikte status (inspanning vereist)\\n→ Juan se hizo abogado. (Juan werd advocaat.)\"}}],\"exercises\":[{\"id\":\"refl-rutina-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Complete the daily routine with the correct reflexive verb (yo form)\",\"nl\":\"Vul de dagelijkse routine aan met het juiste wederkerende werkwoord (yo-vorm)\"},\"items\":[{\"id\":\"refl-001\",\"sentence\":\"Generalmente no ___ hasta las ocho. (levantarse)\",\"correctAnswers\":[\"me levanto\"],\"hint\":\"levantarse: yo → me levanto\"},{\"id\":\"refl-002\",\"sentence\":\"Voy al baño y ___ en el espejo. (mirarse)\",\"correctAnswers\":[\"me miro\"],\"hint\":\"mirarse: yo → me miro\"},{\"id\":\"refl-003\",\"sentence\":\"Entonces, ___ la barba con cuidado. (afeitarse)\",\"correctAnswers\":[\"me afeito\"],\"hint\":\"afeitarse: yo → me afeito\"},{\"id\":\"refl-004\",\"sentence\":\"___ el pijama y entro en la ducha. (quitarse)\",\"correctAnswers\":[\"Me quito\"],\"hint\":\"quitarse: yo → me quito\"},{\"id\":\"refl-005\",\"sentence\":\"Con agua caliente, ___ y canto bajo el agua. (ducharse)\",\"correctAnswers\":[\"me ducho\"],\"hint\":\"ducharse: yo → me ducho\"},{\"id\":\"refl-006\",\"sentence\":\"Cuando termino, ___ con la toalla. (secarse)\",\"correctAnswers\":[\"me seco\"],\"hint\":\"secarse: yo → me seco\"},{\"id\":\"refl-007\",\"sentence\":\"Después ___ los dientes. (cepillarse)\",\"correctAnswers\":[\"me cepillo\"],\"hint\":\"cepillarse: yo → me cepillo\"}]},{\"id\":\"refl-pres-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Complete with the correct reflexive verb form\",\"nl\":\"Vul aan met de juiste wederkerende werkwoordsvorm\"},\"items\":[{\"id\":\"refl-008\",\"sentence\":\"Hace calor y Marcela ___ con ropa ligera. (vestirse)\",\"correctAnswers\":[\"se viste\"],\"hint\":\"vestirse: ella → se viste (e→i)\"},{\"id\":\"refl-009\",\"sentence\":\"En la tienda, las señoras ___ unos sombreros muy elegantes. (probarse)\",\"correctAnswers\":[\"se prueban\"],\"hint\":\"probarse: ellas → se prueban (o→ue)\"},{\"id\":\"refl-010\",\"sentence\":\"Antes de darse un baño, Ana ___. (desvestirse)\",\"correctAnswers\":[\"se desviste\"],\"hint\":\"desvestirse: ella → se desviste (e→i)\"},{\"id\":\"refl-011\",\"sentence\":\"Todos los días, los chicos ___ de sus amigos antes de volver a casa. (despedirse)\",\"correctAnswers\":[\"se despiden\"],\"hint\":\"despedirse: ellos → se despiden (e→i)\"},{\"id\":\"refl-012\",\"sentence\":\"Casi todas las noches yo ___ a las 11 de la noche. (acostarse)\",\"correctAnswers\":[\"me acuesto\"],\"hint\":\"acostarse: yo → me acuesto (o→ue)\"},{\"id\":\"refl-013\",\"sentence\":\"Tom nunca ___ antes de la medianoche. (dormirse)\",\"correctAnswers\":[\"se duerme\"],\"hint\":\"dormirse: él → se duerme (o→ue)\"}]},{\"id\":\"refl-vs-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Choose the correct form — Reflexive or Non-Reflexive?\",\"nl\":\"Kies de juiste vorm — Wederkerend of Niet-Wederkerend?\"},\"items\":[{\"id\":\"refl-014\",\"sentence\":\"Ahora, Ted ___ la sopa para nosotros. (preparar)\",\"correctAnswers\":[\"prepara\"],\"hint\":\"He prepares the soup (for others) → non-reflexive\"},{\"id\":\"refl-015\",\"sentence\":\"Ted también ___ para una fiesta. (prepararse)\",\"correctAnswers\":[\"se prepara\"],\"hint\":\"He gets himself ready → reflexive\"},{\"id\":\"refl-016\",\"sentence\":\"Si tú tomas la sopa de Ted, tú ___. (enfermarse)\",\"correctAnswers\":[\"te enfermas\"],\"hint\":\"You get sick (yourself) → reflexive\"},{\"id\":\"refl-017\",\"sentence\":\"Elisa ___ la sopa. (probar)\",\"correctAnswers\":[\"prueba\"],\"hint\":\"She tastes the soup → non-reflexive (o→ue)\"},{\"id\":\"refl-018\",\"sentence\":\"Ahora ella ___ un vestido nuevo. (probarse)\",\"correctAnswers\":[\"se prueba\"],\"hint\":\"She tries on a dress → reflexive (o→ue)\"},{\"id\":\"refl-019\",\"sentence\":\"Luisa ___ los zapatos. (quitarse)\",\"correctAnswers\":[\"se quita\"],\"hint\":\"She takes off her own shoes → reflexive\"},{\"id\":\"refl-020\",\"sentence\":\"Nancy ___ los platos de la mesa. (quitar)\",\"correctAnswers\":[\"quita\"],\"hint\":\"She removes plates (not from herself) → non-reflexive\"},{\"id\":\"refl-021\",\"sentence\":\"Yo ___ bien con todos mis parientes. (llevarse)\",\"correctAnswers\":[\"me llevo\"],\"hint\":\"I get along with → reflexive\"},{\"id\":\"refl-022\",\"sentence\":\"Nosotros ___ unos regalitos para todos. (llevar)\",\"correctAnswers\":[\"llevamos\"],\"hint\":\"We carry gifts → non-reflexive\"},{\"id\":\"refl-023\",\"sentence\":\"Luís ___ a los niños a las ocho. (acostar)\",\"correctAnswers\":[\"acuesta\"],\"hint\":\"He puts the kids to bed → non-reflexive (o→ue)\"},{\"id\":\"refl-024\",\"sentence\":\"Berta ___ en el sofá. (acostarse)\",\"correctAnswers\":[\"se acuesta\"],\"hint\":\"She lies down → reflexive (o→ue)\"}]},{\"id\":\"refl-become-01\",\"type\":\"fill_in_blank\",\"instruction\":{\"en\":\"Choose the correct 'become' — hacerse, ponerse, or volverse?\",\"nl\":\"Kies het juiste 'worden' — hacerse, ponerse of volverse?\"},\"items\":[{\"id\":\"refl-025\",\"sentence\":\"Miranda ___ arquitecto. (hacerse)\",\"correctAnswers\":[\"se hizo\"],\"hint\":\"Career achievement → hacerse (preterite)\"},{\"id\":\"refl-026\",\"sentence\":\"Marla ___ muda cuando le hablo de su novio. (ponerse)\",\"correctAnswers\":[\"se pone\"],\"hint\":\"Emotional reaction → ponerse\"},{\"id\":\"refl-027\",\"sentence\":\"Yo ___ nervioso cuando veo a Julia. (ponerse)\",\"correctAnswers\":[\"me pongo\"],\"hint\":\"Emotional reaction → ponerse\"},{\"id\":\"refl-028\",\"sentence\":\"Cuando Sandra llama a su novio, él ___ contento. (ponerse)\",\"correctAnswers\":[\"se pone\"],\"hint\":\"Emotional reaction → ponerse\"},{\"id\":\"refl-029\",\"sentence\":\"Si ___ loco, pierdes tu trabajo. (volverse)\",\"correctAnswers\":[\"te vuelves\"],\"hint\":\"Sudden involuntary change → volverse\"},{\"id\":\"refl-030\",\"sentence\":\"Si ellos ___ impacientes no los ayudaremos. (ponerse)\",\"correctAnswers\":[\"se ponen\"],\"hint\":\"Emotional state → ponerse\"},{\"id\":\"refl-031\",\"sentence\":\"Nadie ___ millonario sin trabajar mucho. (hacerse)\",\"correctAnswers\":[\"se hace\"],\"hint\":\"Achieved status → hacerse\"},{\"id\":\"refl-032\",\"sentence\":\"Nadia y yo ___ mudos cuando tenemos miedo. (ponerse)\",\"correctAnswers\":[\"nos ponemos\"],\"hint\":\"Physical reaction → ponerse\"}]}],\"videoPlaceholder\":{\"title\":{\"en\":\"Teacher Explanation Video\",\"nl\":\"Uitleg Video Docent\"},\"description\":{\"en\":\"Video coming soon — Reflexive Verbs explained!\",\"nl\":\"Video komt binnenkort — Wederkerende Werkwoorden uitgelegd!\"}}},\"yearId\":\"cours\",\"lessons\":[{\"slug\":\"verb-tenses-overview\",\"title\":{\"en\":\"Verb Tenses Overview\",\"nl\":\"Overzicht Werkwoordstijden\",\"es\":\"Resumen de los Tiempos Verbales\"},\"order\":1},{\"slug\":\"present-tense-irregulars\",\"title\":{\"en\":\"Present Tense — Irregular Verbs\",\"nl\":\"Tegenwoordige Tijd — Onregelmatige Werkwoorden\",\"es\":\"Presente de Indicativo — Verbos Irregulares\"},\"order\":2},{\"slug\"
