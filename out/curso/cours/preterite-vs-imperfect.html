(with another verb), llamarse, necesitar, parecer, pensar, pertenecer, querer, saber, sentirse, ser, tener, trabajar, vivir\\n\\n**Also imperfect for**: weather, time of day, age, physical/emotional descriptions.\",\"nl\":\"Deze werkwoorden worden typisch gebruikt in de **imperfecto** (beschrijvingen, toestanden, gewoontes):\\n\\ncaber, comprender, creer, doler, entender, estar, estudiar, flotar, funcionar, gustar, ir (met ander werkwoord), llamarse, necesitar, parecer, pensar, pertenecer, querer, saber, sentirse, ser, tener, trabajar, vivir\\n\\n**Ook imperfecto voor**: weer, tijdstip, leeftijd, fysieke/emotionele beschrijvingen.\"}}],\"exercises\":[{\"id\":\"pvi-triggers-01\",\"type\":\"multiple_choice\",\"instruction\":{\"en\":\"Which tense does this trigger word belong to?\",\"nl\":\"Bij welke tijd hoort dit signaalwoord?\"},\"items\":[{\"id\":\"trg-001\",\"sentence\":\"Ayer\",\"correctAnswers\":[\"Indefinido\"],\"translation\":{\"en\":\"Yesterday\",\"nl\":\"Gisteren\"},\"hint\":\"Indefinido|Imperfecto\"},{\"id\":\"trg-002\",\"sentence\":\"Siempre\",\"correctAnswers\":[\"Imperfecto\"],\"translation\":{\"en\":\"Always\",\"nl\":\"Altijd\"},\"hint\":\"Indefinido|Imperfecto\"},{\"id\":\"trg-003\",\"sentence\":\"La semana pasada\",\"correctAnswers\":[\"Indefinido\"],\"translation\":{\"en\":\"Last week\",\"nl\":\"Vorige week\"},\"hint\":\"Indefinido|Imperfecto\"},{\"id\":\"trg-004\",\"sentence\":\"A menudo\",\"correctAnswers\":[\"Imperfecto\"],\"translation\":{\"en\":\"Often\",\"nl\":\"Vaak\"},\"hint\":\"Indefinido|Imperfecto\"},{\"id\":\"trg-005\",\"sentence\":\"De repente\",\"correctAnswers\":[\"Indefinido\"],\"translation\":{\"en\":\"Suddenly\",\"nl\":\"Plotseling\"},\"hint\":\"Indefinido|Imperfecto\"},{\"id\":\"trg-006\",\"sentence\":\"Cada día\",\"correctAnswers\":[\"Imperfecto\"],\"translation\":{\"en\":\"Every day\",\"nl\":\"Elke dag\"},\"hint\":\"Indefinido|Imperfecto\"},{\"id\":\"trg-007\",\"sentence\":\"Anoche\",\"correctAnswers\":[\"Indefinido\"],\"translat
