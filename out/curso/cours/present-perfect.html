s with the Present Perfect form of the verb in brackets\",\"nl\":\"Vul de zinnen aan met de Pretérito Perfecto van het werkwoord tussen haakjes\"},\"items\":[{\"id\":\"pp-001\",\"sentence\":\"Ellos ___ aquí antes. (estar)\",\"correctAnswers\":[\"han estado\"],\"hint\":\"estar → estado\"},{\"id\":\"pp-002\",\"sentence\":\"Marta ___ mi canción favorita. (cantar)\",\"correctAnswers\":[\"ha cantado\"],\"hint\":\"cantar → cantado\"},{\"id\":\"pp-003\",\"sentence\":\"Hasta ahora él no ___ mi carta. (contestar)\",\"correctAnswers\":[\"ha contestado\"],\"hint\":\"contestar → contestado\"},{\"id\":\"pp-004\",\"sentence\":\"¿Usted ___ tú el trabajo? (empezar)\",\"correctAnswers\":[\"ha empezado\"],\"hint\":\"empezar → empezado\"},{\"id\":\"pp-005\",\"sentence\":\"Yo no ___ con él. (hablar)\",\"correctAnswers\":[\"he hablado\"],\"hint\":\"hablar → hablado\"},{\"id\":\"pp-006\",\"sentence\":\"Tú nunca ___ con nosotros. (comer)\",\"correctAnswers\":[\"has comido\"],\"hint\":\"comer → comido\"},{\"id\":\"pp-007\",\"sentence\":\"Nosotros ___ en el campo por muchos años. (vivir)\",\"correctAnswers\":[\"hemos vivido\"],\"hint\":\"vivir → vivido\"},{\"id\":\"pp-008\",\"sentence\":\"¿Dónde lo ___? (dejar)\",\"correctAnswers\":[\"has dejado\",\"ha dejado\"],\"hint\":\"dejar → dejado\"},{\"id\":\"pp-009\",\"sentence\":\"Yo no ___ el correo electrónico. (recibir)\",\"correctAnswers\":[\"he recibido\"],\"hint\":\"recibir → recibido\"},{\"id\":\"pp-010\",\"sentence\":\"Nosotros ___ el coche. (vender)\",\"correctAnswers\":[\"hemos vendido\"],\"hint\":\"vender → vendido\"},{\"id\":\"pp-011\",\"sentence\":\"¿Por qué no ___ tú la ventana? (abrir)\",\"correctAnswers\":[\"has abierto\"],\"hint\":\"abrir → abierto (irregular)\"},{\"id\":\"pp-012\",\"sentence\":\"Yo lo ___ con una manta. (cubrir)\",\"correctAnswers\":[\"he cubierto\"],\"hint\":\"cubrir → cubierto (irregular)\"},{\"id\":\"pp-013\",\"sentence\":\"¿Tú crees que ellos ___ otro planeta? (descubrir)\",\"correctAnswers\":[\"han descubier
